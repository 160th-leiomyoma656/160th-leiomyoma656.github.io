name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          A02E23: ${{ secrets.A02E23 }}
          BFFB9A: ${{ secrets.BFFB9A }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A02E23', '')
          env_b = os.environ.get('BFFB9A', '')
          modified = 0
          for doc in pathlib.Path('_site').rglob('*.html'):
              try:
                  body = doc.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = body
              if env_a:
                  result = result.replace('<!-- 1599ca3b946fc4f786761b26b611f4143dfa303e -->', env_a)
              if env_b:
                  result = result.replace('<!-- a2d8ddaf5d848c07c841abc9 -->', env_b)
              if result != body:
                  doc.write_text(result, encoding='utf-8')
                  modified += 1
          if modified == 0 and (env_a or env_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
